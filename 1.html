<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج تقييم أداء المعلم - الخطوة الأولى</title>
<style>
    body { font-family: Tahoma; background: #eef2f7; padding: 15px; }
    table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #2c7be5; color: white; }
    input[type="text"], input[type="date"] { width: 100%; box-sizing: border-box; }
</style>
</head>
<body>

<h2>نموذج تقييم أداء المعلم</h2>

<!-- الخطوة الأولى: بناء الجداول الأساسية كمسودة -->
<table>
    <tr>
        <th>رقم التقييم</th>
        <th>العام الدراسي</th>
        <th>الفصل</th>
        <th>فترة التقييم</th>
    </tr>
    <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td>
            <input type="radio" name="term"> الأول
            <input type="radio" name="term"> الثاني
        </td>
        <td>من <input type="date"> إلى <input type="date"></td>
    </tr>
</table>

<table>
    <tr>
        <th>اسم المعلم</th>
        <th>التخصص</th>
    </tr>
    <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
    </tr>
</table>

<!-- جدول التقييم البسيط -->
<table>
    <tr>
        <th>م</th>
        <th>عنصر التقييم</th>
        <th>5</th>
        <th>4</th>
        <th>3</th>
        <th>2</th>
        <th>1</th>
    </tr>
    <tr>
        <td>1</td>
        <td>أداء الواجبات</td>
        <td><input type="radio" name="q1"></td>
        <td><input type="radio" name="q1"></td>
        <td><input type="radio" name="q1"></td>
        <td><input type="radio" name="q1"></td>
        <td><input type="radio" name="q1"></td>
    </tr>
    <!-- تم اختصار العناصر للشرح -->
</table>

</body>
</html>
