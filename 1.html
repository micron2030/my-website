<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج تقييم أداء المعلم</title>

<style>
body{
    font-family: Tahoma;
    background:#eef2f7;
    padding:20px;
}

/* 🔥 السر الحقيقي: توحيد الشبكة */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    background:white;
    margin-bottom:15px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
    vertical-align:middle;
}

th{
    background:#2c7be5;
    color:white;
}

/* إدخالات */
input[type="text"], input[type="date"]{
    width:100%;
    text-align:center;
    padding:4px;
    box-sizing:border-box;
}

/* مربعات السجل */
.id-box{
    width:18px;
    height:22px;
    text-align:center;
    border:1px solid #999;
    margin:0 1px;
}

/* النتائج */
.result{
    background:white;
    padding:15px;
    border:2px solid #2c7be5;
    border-radius:10px;
    font-size:18px;
}

.good{color:green;}
.medium{color:orange;}
.bad{color:red;}

/* أزرار */
.buttons{
    text-align:center;
    margin-top:15px;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
}

@media print{
    .buttons{display:none;}
}
</style>
</head>

<body>

<h2 style="text-align:center;">نموذج تقييم أداء المعلم</h2>

<!-- ===================== 1. رأس النموذج ===================== -->
<table>

<tr>
<th colspan="2">رقم التقييم</th>
<th colspan="3">العام الدراسي</th>
<th colspan="2">الفصل</th>
<th colspan="3">فترة التقييم</th>
</tr>

<tr>
<td colspan="2"><input type="text"></td>
<td colspan="3"><input type="text" placeholder="1447 - 1448"></td>

<td colspan="2">
<label><input type="radio" name="term"> الأول</label>
<label><input type="radio" name="term"> الثاني</label>
</td>

<td colspan="1">من <input type="date"></td>
<td colspan="2">إلى <input type="date"></td>
</tr>

</table>

<!-- ===================== 2. بيانات المعلم ===================== -->
<table>

<tr>
<th colspan="5">اسم المعلم رباعياً</th>
<th colspan="5">السجل المدني</th>
</tr>

<tr>
<td colspan="5"><input type="text" placeholder="اسم المعلم"></td>

<td colspan="5">
<div style="display:flex; justify-content:center;">
<script>
for(let i=0;i<10;i++){
document.write('<input maxlength="1" class="id-box">');
}
</script>
</div>
</td>
</tr>

<!-- صف مهني موحد على نفس الشبكة -->
<tr>
<th colspan="2">التخصص</th>
<td colspan="3"><input type="text"></td>

<th colspan="2">مادة التدريس</th>
<td colspan="2"><input type="text"></td>

<th colspan="1">الأداء السابق</th>
<td colspan="0"></td>
</tr>

</table>

<!-- ===================== 3. التقييم ===================== -->
<table>

<tr>
<th>م</th>
<th>عنصر التقييم</th>
<th>الوزن %</th>
<th>5</th>
<th>4</th>
<th>3</th>
<th>2</th>
<th>1</th>
</tr>

<script>
const items = [
["أداء الواجبات الوظيفية",10],
["التفاعل مع المجتمع المهني",10],
["التفاعل مع أولياء الأمور",10],
["التنوع في استراتيجيات التدريس",10],
["تحسين نتائج المتعلمين",10],
["إعداد وتنفيذ خطة التعلم",10],
["توظيف تقنيات ووسائل التعلم",10],
["تهيئة بيئة تعليمية",5],
["الإدارة الصفية",5],
["تحليل نتائج المتعلمين",10],
["تنوع أساليب التقويم",10]
];

document.write(items.map((item,i)=>`
<tr>
<td>${i+1}</td>
<td>${item[0]}</td>
<td>${item[1]}%</td>
${[5,4,3,2,1].map(v=>`
<td><input type="radio" name="q${i}" value="${v}" onclick="calc()"></td>
`).join('')}
</tr>
`).join(''));
</script>

</table>

<!-- ===================== النتائج ===================== -->
<div class="result" id="result">
النتيجة ستظهر بعد إكمال التقييم
</div>

<!-- ===================== الأزرار ===================== -->
<div class="buttons">
<button onclick="window.print()">🖨️ طباعة / PDF</button>
</div>

<!-- ===================== الحساب ===================== -->
<script>
function calc(){

let weightedSum = 0;
let totalWeight = 0;
let count = 0;

for(let i=0;i<items.length;i++){
let selected = document.querySelector(`input[name="q${i}"]:checked`);
let weight = items[i][1];

if(selected){
weightedSum += parseInt(selected.value) * weight;
totalWeight += weight;
count++;
}
}

if(count < items.length){
document.getElementById("result").innerHTML="⚠️ أكمل جميع عناصر التقييم";
return;
}

let avg = (weightedSum / totalWeight).toFixed(2);
let percent = ((avg/5)*100).toFixed(2);

let grade="", cls="";

if(avg>=4.5){grade="ممتاز";cls="good";}
else if(avg>=3.5){grade="جيد جداً";cls="good";}
else if(avg>=2.5){grade="جيد";cls="medium";}
else if(avg>=1.5){grade="مقبول";cls="medium";}
else{grade="غير مرضي";cls="bad";}

document.getElementById("result").innerHTML=`
📊 المتوسط: <b>${avg}</b> من 5<br>
📈 النسبة: <b>${percent}%</b><br>
🏆 التقدير: <b class="${cls}">${grade}</b>
`;
}
</script>

</body>
</html>
