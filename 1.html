<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج تقييم أداء المعلم</title>

<style>
body{
    font-family: Tahoma;
    background:#eef2f7;
    padding:15px;
    font-size:14px;
}

/* ضغط المسافات للطباعة */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    background:white;
    margin-bottom:10px;
}

th,td{
    border:1px solid #ccc;
    padding:5px;
    text-align:center;
    vertical-align:middle;
    line-height:1.2;
}

th{
    background:#2c7be5;
    color:white;
    font-size:13px;
}

/* إدخالات مضغوطة */
input[type="text"], input[type="date"]{
    width:100%;
    text-align:center;
    padding:3px;
    font-size:13px;
    box-sizing:border-box;
}

/* مربعات السجل */
.id-box{
    width:18px;
    height:20px;
    text-align:center;
    border:1px solid #999;
    margin:0 1px;
    font-size:13px;
}

/* النتائج */
.result{
    background:white;
    padding:10px;
    border:2px solid #2c7be5;
    border-radius:8px;
    font-size:15px;
}

/* أزرار */
.buttons{
    text-align:center;
    margin-top:10px;
}

button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
}

/* طباعة صفحة واحدة */
@media print{
    body{zoom:0.95;}
    .buttons{display:none;}
}
</style>
</head>

<body>

<h2 style="text-align:center; font-size:16px;">نموذج تقييم أداء المعلم</h2>

<!-- ===================== الرأس ===================== -->
<table>

<tr>
<th colspan="2">رقم التقييم</th>
<th colspan="3">العام الدراسي</th>
<th colspan="2">الفصل</th>
<th colspan="3">فترة التقييم</th>
</tr>

<tr>
<td colspan="2"><input type="text"></td>
<td colspan="3"><input type="text"></td>

<td colspan="2">
<label><input type="radio" name="term"> الأول</label>
<label><input type="radio" name="term"> الثاني</label>
</td>

<td colspan="3">من <input type="date"> إلى <input type="date"></td>
</tr>

</table>

<!-- ===================== بيانات المعلم ===================== -->
<table>

<tr>
<th colspan="5">اسم المعلم رباعياً</th>
<th colspan="5">السجل المدني</th>
</tr>

<tr>
<td colspan="5"><input type="text"></td>

<td colspan="5">
<div style="display:flex; justify-content:center;">
<script>
for(let i=0;i<10;i++){
document.write(`<input class="id-box" maxlength="1" id="id${i}" oninput="moveNext(this,${i})">`);
}
</script>
</div>
</td>
</tr>

<!-- الأداء السابق تحت السجل المدني -->
<tr>
<th colspan="5">التخصص</th>
<th colspan="5">مادة التدريس</th>
</tr>

<tr>
<td colspan="5"><input type="text"></td>
<td colspan="5"><input type="text"></td>
</tr>

<tr>
<th colspan="10">الأداء السابق (رقم من خانتين)</th>
</tr>

<tr>
<td colspan="10">
<input type="text" maxlength="2" style="width:80px; text-align:center;">
</td>
</tr>

</table>

<!-- ===================== التقييم ===================== -->
<table>

<tr>
<th>م</th>
<th>عنصر التقييم</th>
<th>الوزن %</th>
<th>5</th>
<th>4</th>
<th>3</th>
<th>2</th>
<th>1</th>
</tr>

<script>
const items = [
["أداء الواجبات",10],
["التفاعل المهني",10],
["أولياء الأمور",10],
["استراتيجيات التدريس",10],
["تحسين النتائج",10],
["الخطة التعليمية",10],
["التقنيات",10],
["البيئة الصفية",5],
["الإدارة الصفية",5],
["تحليل النتائج",10],
["التقويم",10]
];

document.write(items.map((item,i)=>`
<tr>
<td>${i+1}</td>
<td>${item[0]}</td>
<td>${item[1]}%</td>
${[5,4,3,2,1].map(v=>`
<td><input type="radio" name="q${i}" value="${v}" onclick="calc()"></td>
`).join('')}
</tr>
`).join(''));
</script>

</table>

<!-- ===================== النتائج ===================== -->
<div class="result" id="result">
النتيجة ستظهر بعد الإكمال
</div>

<div class="buttons">
<button onclick="window.print()">🖨️ طباعة / PDF</button>
</div>

<script>

/* 🔁 الانتقال التلقائي بين مربعات السجل */
function moveNext(el,i){
if(el.value.length === 1){
let next = document.getElementById("id"+(i+1));
if(next) next.focus();
}
}

/* الحساب */
function calc(){

let sum=0, weight=0, count=0;

for(let i=0;i<items.length;i++){
let sel=document.querySelector(`input[name="q${i}"]:checked`);
if(sel){
sum += sel.value * items[i][1];
weight += items[i][1];
count++;
}
}

if(count<items.length){
document.getElementById("result").innerHTML="⚠️ أكمل التقييم";
return;
}

let avg=(sum/weight).toFixed(2);
let percent=((avg/5)*100).toFixed(2);

let grade="";
if(avg>=4.5) grade="ممتاز";
else if(avg>=3.5) grade="جيد جداً";
else if(avg>=2.5) grade="جيد";
else if(avg>=1.5) grade="مقبول";
else grade="غير مرضي";

document.getElementById("result").innerHTML=`
📊 المتوسط: ${avg}<br>
📈 النسبة: ${percent}%<br>
🏆 التقدير: ${grade}
`;
}

</script>

</body>
</html>
